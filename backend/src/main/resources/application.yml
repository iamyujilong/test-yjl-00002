server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./data/example_db.sqlite
    driver-class-name: org.sqlite.JDBC
  
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

jwt:
  secret: teacher_recruitment_jwt_secret_key_2024
  expiration: 86400000

file:
  upload-dir: ./uploads
