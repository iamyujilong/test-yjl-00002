
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/teacher_recruitment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  servlet:
